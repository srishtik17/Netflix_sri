<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>netflix</title>
  <link rel="stylesheet" href="netflix.css">
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}


body {
   font-family: Arial, Helvetica, sans-serif;
   background-image: url(./images/netflix.png);
   background-size: cover;
   background-repeat: no-repeat;
   height: 100vh;
   position: relative;
   }

nav {
    justify-content: space-around;
}

.shade {
  position: absolute;
  background-color: rgba(0, 0, 0, 0.7);
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}


nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;
  z-index: 2;
  position: relative;
}

.netflix {
  font-size: 2rem;
  font-weight: bold;
  color: #e50914;
  
}



.start-btn {
  background-color: #e50914;
  color: white;
  padding: 7px 15px;
  border-radius: 4px;
  font-size: 14px;
  cursor: pointer;
}

.start-btn:hover {
  background-color: #e50914;
}


.main {
  position: relative;
  top: 30%;
  text-align: center;
  z-index: 2;
  padding: 0 20px;
  color:aliceblue;
}

.main h1 {
  font-size: 2.5rem;
  font-weight: bold;
  margin-bottom: 20px;
  color:azure;
}

.main p {
  margin: 20px 0;
  color:azure;

}


.textbox {
  margin-top: 20px;
}

.email {
  padding: 10px;
  width: 300px;
  max-width: 70%;
  border: none;
  outline: none;
  font-size: 14px;
}

.textbox .start-btn {
  padding: 10px 20px;
  font-size: 16px;
  margin-left: 5px;
  border: none;
}

  </style>
</head>

<body>
    <header> 
        <nav>
            <span class="netflix">NETFLIX</span>
            

            </div>
            <span class="start-btn"> Sign in</span>
        </nav>
    </header>
    <article>
        <div class="shade">
            <div class="main">
                <h1><br>Unlimited movies,TV<br>shows and more<br></h1>
                <p style="font-size:20px;">Watch anywhere.Cancel at any time</p>
                <p style="font-size:20px">
                    Ready to watch? Enter your email to create or restart your membership.
                <div class="textbox">
                    <input type="text" placeholder="Email adress" class="email">
                    <button class="start-btn"> Get Started </button>
                </div>
            
                </p>
            </div>
        </div>
    </article>

</body>
